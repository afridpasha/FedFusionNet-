<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register | FedFusionNet++</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/responsive-global.css') }}">
    
    <!-- Leaflet CSS (Free Open Source Maps) -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        * { font-family: 'Poppins', sans-serif; }
        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 50%, #f093fb 100%);
            background-size: 400% 400%;
            animation: gradientShift 15s ease infinite;
        }
        @keyframes gradientShift {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }
        .glass-card {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(20px);
            border-radius: 30px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
        }
    </style>
</head>
<body class="p-4">
    <div class="max-w-4xl mx-auto py-8">
        <div class="text-center mb-8 text-white">
            <h1 class="text-5xl font-extrabold mb-2">
                <i class="fas fa-hospital-alt"></i> Hospital Registration
            </h1>
            <p class="text-xl">Join the FedFusionNet++ Network</p>
        </div>
        
        <div class="glass-card p-10">
            <form id="signupForm" enctype="multipart/form-data">
                <h2 class="text-3xl font-bold text-gray-800 mb-6">Hospital Information</h2>
                
                <div class="grid md:grid-cols-2 gap-6 mb-6">
                    <div>
                        <label class="block text-gray-700 font-semibold mb-2">Hospital Name *</label>
                        <input type="text" name="hospital_name" required
                               class="w-full px-4 py-3 border-2 border-gray-300 rounded-xl focus:border-purple-500 focus:outline-none">
                    </div>
                    <div>
                        <label class="block text-gray-700 font-semibold mb-2">GST Number *</label>
                        <input type="text" name="gst_number" pattern="[0-9]{2}[A-Z]{5}[0-9]{4}[A-Z]{1}[1-9A-Z]{1}Z[0-9A-Z]{1}" required
                               class="w-full px-4 py-3 border-2 border-gray-300 rounded-xl focus:border-purple-500 focus:outline-none">
                    </div>
                    <div>
                        <label class="block text-gray-700 font-semibold mb-2">Email *</label>
                        <input type="email" name="email" id="email" required
                               class="w-full px-4 py-3 border-2 border-gray-300 rounded-xl focus:border-purple-500 focus:outline-none">
                    </div>
                    <div>
                        <label class="block text-gray-700 font-semibold mb-2">Phone *</label>
                        <input type="tel" name="phone" required
                               class="w-full px-4 py-3 border-2 border-gray-300 rounded-xl focus:border-purple-500 focus:outline-none">
                    </div>
                    <div class="md:col-span-2">
                        <label class="block text-gray-700 font-semibold mb-2">
                            <i class="fas fa-map-marker-alt mr-2"></i>Address *
                        </label>
                        <div class="relative">
                            <textarea name="address" id="address" rows="2" required
                                      class="w-full px-4 py-3 border-2 border-gray-300 rounded-xl focus:border-purple-500 focus:outline-none"
                                      placeholder="Type address and press Enter, or click 'Pick Location'"></textarea>
                            <button type="button" onclick="pickLocation()" 
                                    class="absolute top-2 right-2 bg-blue-500 hover:bg-blue-600 text-white px-4 py-2 rounded-lg text-sm font-semibold transition">
                                <i class="fas fa-map-pin mr-1"></i>Pick Location
                            </button>
                        </div>
                        <button type="button" onclick="searchAddress()" 
                                class="mt-2 bg-green-500 hover:bg-green-600 text-white px-4 py-2 rounded-lg text-sm font-semibold transition">
                            <i class="fas fa-search mr-1"></i>Find on Map
                        </button>
                        <button type="button" onclick="useCurrentLocation()" 
                                class="mt-2 ml-2 bg-orange-500 hover:bg-orange-600 text-white px-4 py-2 rounded-lg text-sm font-semibold transition">
                            <i class="fas fa-location-arrow mr-1"></i>Use Current Location
                        </button>
                        <div id="map" class="mt-2 rounded-xl overflow-hidden" style="height: 300px; display: none;"></div>
                        <p class="text-xs text-gray-500 mt-1">
                            <i class="fas fa-info-circle"></i> Click on map to select your hospital location
                        </p>
                    </div>
                    <div>
                        <label class="block text-gray-700 font-semibold mb-2">Password *</label>
                        <input type="password" name="password" id="password" minlength="8" required
                               class="w-full px-4 py-3 border-2 border-gray-300 rounded-xl focus:border-purple-500 focus:outline-none">
                    </div>
                    <div>
                        <label class="block text-gray-700 font-semibold mb-2">Confirm Password *</label>
                        <input type="password" id="confirmPassword" required
                               class="w-full px-4 py-3 border-2 border-gray-300 rounded-xl focus:border-purple-500 focus:outline-none">
                    </div>
                </div>
                
                <h3 class="text-2xl font-bold text-gray-800 mb-4">Upload Documents</h3>
                <div class="grid md:grid-cols-2 gap-6 mb-6">
                    <div>
                        <label class="block text-gray-700 font-semibold mb-2">GST Certificate *</label>
                        <input type="file" name="gst_file" accept=".pdf,.jpg,.jpeg,.png" required
                               class="w-full px-4 py-3 border-2 border-gray-300 rounded-xl focus:border-purple-500 focus:outline-none">
                    </div>
                    <div>
                        <label class="block text-gray-700 font-semibold mb-2">Clinical Registration *</label>
                        <input type="file" name="clinical_file" accept=".pdf,.jpg,.jpeg,.png" required
                               class="w-full px-4 py-3 border-2 border-gray-300 rounded-xl focus:border-purple-500 focus:outline-none">
                    </div>
                </div>
                
                <button type="submit"
                        class="w-full bg-gradient-to-r from-purple-600 to-blue-600 text-white py-4 rounded-xl font-bold text-lg hover:shadow-2xl transition">
                    <i class="fas fa-paper-plane mr-2"></i>Submit Registration
                </button>
                
                <div class="text-center mt-6">
                    <a href="/" class="text-purple-600 font-semibold hover:underline">
                        Already registered? Login here
                    </a>
                </div>
            </form>
        </div>
    </div>
    
    <script>
        document.getElementById('signupForm').addEventListener('submit', async function(e) {
            e.preventDefault();
            
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const confirmPassword = document.getElementById('confirmPassword').value;
            
            const blockedDomains = ['gmail.com', 'yahoo.com', 'outlook.com', 'hotmail.com', 'rediffmail.com'];
            if (blockedDomains.includes(email.split('@')[1])) {
                alert('❌ Personal emails not allowed!');
                return;
            }
            
            if (password !== confirmPassword) {
                alert('❌ Passwords do not match!');
                return;
            }
            
            const formData = new FormData(this);
            
            const btn = this.querySelector('button[type="submit"]');
            btn.innerHTML = '<i class="fas fa-spinner fa-spin mr-2"></i>Submitting...';
            btn.disabled = true;
            
            try {
                const response = await fetch('/api/register', {
                    method: 'POST',
                    body: formData
                });
                
                const data = await response.json();
                
                if (data.success) {
                    alert('✅ Registration successful! You can now login.');
                    window.location.href = '/';
                } else {
                    alert('❌ ' + data.message);
                }
            } catch (error) {
                alert('❌ Error: ' + error.message);
            } finally {
                btn.innerHTML = '<i class="fas fa-paper-plane mr-2"></i>Submit Registration';
                btn.disabled = false;
            }
        });
    </script>
    
    <!-- Leaflet JS (Free Open Source Maps) -->
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    
    <script>
        let map = null;
        let marker = null;
        
        // Use current GPS location
        function useCurrentLocation() {
            if (!navigator.geolocation) {
                alert('❌ Geolocation is not supported by your browser');
                return;
            }
            
            // Show loading
            const btn = event.target;
            const originalHTML = btn.innerHTML;
            btn.innerHTML = '<i class="fas fa-spinner fa-spin mr-1"></i>Getting Location...';
            btn.disabled = true;
            
            navigator.geolocation.getCurrentPosition(
                function(position) {
                    const lat = position.coords.latitude;
                    const lng = position.coords.longitude;
                    
                    // Show map
                    const mapDiv = document.getElementById('map');
                    mapDiv.style.display = 'block';
                    
                    if (!map) {
                        initializeMap();
                        setTimeout(() => {
                            map.invalidateSize();
                            map.setView([lat, lng], 16);
                            addMarker(lat, lng);
                            getAddress(lat, lng);
                        }, 100);
                    } else {
                        map.invalidateSize();
                        map.setView([lat, lng], 16);
                        addMarker(lat, lng);
                        getAddress(lat, lng);
                    }
                    
                    btn.innerHTML = originalHTML;
                    btn.disabled = false;
                },
                function(error) {
                    alert('❌ Unable to get your location. Please enter address manually.');
                    btn.innerHTML = originalHTML;
                    btn.disabled = false;
                },
                { enableHighAccuracy: true, timeout: 10000 }
            );
        }
        
        // Search address and show on map
        async function searchAddress() {
            const address = document.getElementById('address').value.trim();
            
            if (!address) {
                alert('Please enter an address first');
                return;
            }
            
            try {
                // Try multiple geocoding services
                let lat, lng, displayName;
                
                // Method 1: Nominatim with better query
                const nominatimUrl = `https://nominatim.openstreetmap.org/search?format=json&q=${encodeURIComponent(address)}&limit=1&addressdetails=1`;
                const response1 = await fetch(nominatimUrl, {
                    headers: { 'User-Agent': 'FedFusionNet++ Hospital Registration' }
                });
                const data1 = await response1.json();
                
                if (data1 && data1.length > 0) {
                    lat = parseFloat(data1[0].lat);
                    lng = parseFloat(data1[0].lon);
                    displayName = data1[0].display_name;
                } else {
                    // Method 2: Try with city name if full address fails
                    const cityMatch = address.match(/Hyderabad|Mumbai|Delhi|Bangalore|Chennai|Kolkata/i);
                    if (cityMatch) {
                        const cityUrl = `https://nominatim.openstreetmap.org/search?format=json&city=${cityMatch[0]}&country=India&limit=1`;
                        const response2 = await fetch(cityUrl, {
                            headers: { 'User-Agent': 'FedFusionNet++ Hospital Registration' }
                        });
                        const data2 = await response2.json();
                        
                        if (data2 && data2.length > 0) {
                            lat = parseFloat(data2[0].lat);
                            lng = parseFloat(data2[0].lon);
                            displayName = address; // Keep original address
                        }
                    }
                }
                
                if (lat && lng) {
                    // Show map
                    const mapDiv = document.getElementById('map');
                    mapDiv.style.display = 'block';
                    
                    if (!map) {
                        initializeMap();
                        // Wait for map to initialize
                        setTimeout(() => {
                            map.invalidateSize();
                            map.setView([lat, lng], 16);
                            addMarker(lat, lng);
                        }, 100);
                    } else {
                        map.invalidateSize();
                        map.setView([lat, lng], 16);
                        addMarker(lat, lng);
                    }
                    
                    // Update address if we got a better one
                    if (displayName && displayName !== address) {
                        document.getElementById('address').value = displayName;
                    }
                    
                    // Show alert after map is visible
                    if (!data1 || data1.length === 0) {
                        setTimeout(() => {
                            alert('📍 Showing approximate location. Please drag the marker to your exact location.');
                        }, 200);
                    }
                } else {
                    alert('❌ Address not found. Try:\n1. Enter city name (e.g., "Hyderabad")\n2. Click "Pick Location" to select manually');
                }
            } catch (error) {
                alert('❌ Error searching address. Please click "Pick Location" to select manually.');
                console.error(error);
            }
        }
        
        function addMarker(lat, lng) {
            if (marker) {
                marker.setLatLng([lat, lng]);
            } else {
                marker = L.marker([lat, lng], {draggable: true}).addTo(map);
                marker.bindPopup('📍 Drag me to adjust location').openPopup();
                marker.on('dragend', function(e) {
                    const pos = marker.getLatLng();
                    getAddress(pos.lat, pos.lng);
                });
            }
        }
        
        function pickLocation() {
            const mapDiv = document.getElementById('map');
            
            if (mapDiv.style.display === 'none') {
                mapDiv.style.display = 'block';
                
                if (!map) {
                    initializeMap();
                    setTimeout(() => map.invalidateSize(), 100);
                } else {
                    map.invalidateSize();
                }
            } else {
                mapDiv.style.display = 'none';
            }
        }
        
        function initializeMap() {
            // Initialize map (centered on India)
            map = L.map('map').setView([20.5937, 78.9629], 5);
            
            // Add OpenStreetMap tiles (FREE)
            L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
                attribution: '© OpenStreetMap contributors',
                maxZoom: 19
            }).addTo(map);
            
            // Get user's current location
            if (navigator.geolocation) {
                navigator.geolocation.getCurrentPosition(function(position) {
                    const lat = position.coords.latitude;
                    const lng = position.coords.longitude;
                    map.setView([lat, lng], 13);
                    addMarker(lat, lng);
                    getAddress(lat, lng);
                });
            }
            
            // Click on map to place marker
            map.on('click', function(e) {
                addMarker(e.latlng.lat, e.latlng.lng);
                getAddress(e.latlng.lat, e.latlng.lng);
            });
        }
        
        async function getAddress(lat, lng) {
            try {
                // Use Nominatim (OpenStreetMap) Reverse Geocoding API (FREE)
                const response = await fetch(`https://nominatim.openstreetmap.org/reverse?format=json&lat=${lat}&lon=${lng}`);
                const data = await response.json();
                
                if (data.display_name) {
                    document.getElementById('address').value = data.display_name;
                }
            } catch (error) {
                console.error('Error getting address:', error);
            }
        }
    </script>
</body>
</html>
